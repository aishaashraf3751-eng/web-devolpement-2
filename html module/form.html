<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>My Doctors Appointment</h1>
    <p>Fill in the form below to schedule your appointment</p>

    <form>

        <fieldset>
            <legend>Personal Information</legend>

            <label>Patient ID</label><br>
            <input type="password" id="pid" placeholder="Your secret ID"><br>

            <label>DOB</label><br>
            <input type="date" id="dob"><br>
        </fieldset>

        <br>

        <fieldset>
            <legend>YOUR VISIT</legend>
            <select id="doctor">
                <option value="">Select a doctor</option>
                <option value="dr.ray">Dr. Ray</option>
                <option value="dr.lee">Dr. Lee</option>
                <option value="dr.sam">Dr. Sam</option>
            </select><br>

            <label>why are you visiting?</label>
            <input type="radio" name="reason" value="fever">fever<br>
            <input type="radio" name="reason" value="cold">cold<br>
            <input type="radio" name="reason" value="checkup">checkup<br>
            <input type="radio" name="reason" value="tooth">tooth pain<br>

            <label>any notes for the doctor?</label><br>
            <textarea id="notes" rows="3" cols="35" placeholder="e.g., I have had a sour throat for 3 days"></textarea><br>
                
        </fieldset>
    </form>
    
</body>
</html>
